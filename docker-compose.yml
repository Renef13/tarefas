services:
  api:
    depends_on:
      - db

    build:
      context: .
      dockerfile: app/Dockerfile

    ports:
      - "127.0.0.1:5000:5000"

    volumes:
      - ./app:/home/user/app/app
      - ./.env:/home/user/app/.env

    env_file:
      - .env

    restart: unless-stopped

  db:
    image: postgres:14.5

    restart: unless-stopped

    ports:
      - "127.0.0.1:5432:5432"

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: